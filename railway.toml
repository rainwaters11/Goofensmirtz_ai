[project]
name = "pet-pov-ai"

[services.api]
root = "."
build = "pnpm install && pnpm turbo run build --filter @pet-pov/api"
start = "pnpm --filter @pet-pov/api start"

[services.web]
root = "."
build = "pnpm install && pnpm turbo run build --filter @pet-pov/web"
start = "pnpm --filter @pet-pov/web start"
