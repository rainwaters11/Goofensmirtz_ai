[project]
name = "pet-pov-ai"

[services.api]
root = "."
dockerfile = "apps/api/Dockerfile"
start = "pnpm --filter @pet-pov/api start"

[services.web]
root = "."
dockerfile = "apps/web/Dockerfile"
start = "pnpm --filter @pet-pov/web start"

[services.worker]
root = "."
dockerfile = "apps/worker/Dockerfile"
start = "pnpm --filter @pet-pov/worker start"
